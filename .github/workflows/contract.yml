name: contract
on:
  schedule:
    - cron: "0 22 * * *"  # 22:00 UTC daily = 05:00 ICT
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run pytest -m contract -v
        continue-on-error: true
      - if: failure()
        name: post failure to alerter
        run: |
          echo "Contract tests failed. Manual review required."
          # TODO: gcloud pubsub publish to platform-alerts on staging

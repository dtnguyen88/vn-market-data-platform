name: deploy-staging
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
concurrency:
  group: deploy-staging
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_STAGING }}
          service_account: ${{ secrets.WIF_SA_STAGING }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: build all images via Cloud Build
        run: ./scripts/build-and-push.sh staging
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: terraform apply
        working-directory: infra/envs/staging
        run: |
          terraform init
          terraform apply -auto-approve

# Cloud Build config for batch-reference image.
# Triggered manually or via build-and-push.sh.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/batch-reference:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/batch-reference:$SHORT_SHA
      - -f
      - src/batch/reference/Dockerfile
      - .
images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/batch-reference:latest
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/batch-reference:$SHORT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 600s

# Cloud Build config for ops-dlq-replay image.
# Triggered manually or via build-and-push.sh.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-dlq-replay:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-dlq-replay:$SHORT_SHA
      - -f
      - src/ops/dlq_replay/Dockerfile
      - .
images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-dlq-replay:latest
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-dlq-replay:$SHORT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 600s

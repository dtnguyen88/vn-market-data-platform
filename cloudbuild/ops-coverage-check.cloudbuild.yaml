# Cloud Build config for ops-coverage-check image.
# Triggered manually or via build-and-push.sh.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-coverage-check:latest
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-coverage-check:$SHORT_SHA
      - -f
      - src/ops/coverage_check/Dockerfile
      - .
images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-coverage-check:latest
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/vn-market/ops-coverage-check:$SHORT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 600s
